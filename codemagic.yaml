workflows:
  android-apk:
    name: APK Final
    environment:
      flutter: 3.22.0
    scripts:
      - rm -rf android
      - flutter create --platforms=android --no-overwrite .
      - flutter pub get
      - chmod +x android/gradlew
      - flutter build apk --release --no-tree-shake-icons
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
