workflows:
  android-apk:
    name: Gerar APK Final

    environment:
      flutter: 3.19.0

    scripts:
      - rm -rf android
      - flutter create --platforms=android .
      - flutter pub get
      - chmod +x android/gradlew
      - flutter build apk --release --no-tree-shake-icons

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
