workflows:
  android-apk:
    name: Nutri Control APK
    environment:
      flutter: 3.16.9
    scripts:
      - flutter clean
      - flutter pub get
      - flutter create --platforms=android --no-overwrite .
      - echo "minSdkVersion=20" >> android/app/gradle.properties
      - echo "compileSdkVersion=34" >> android/app/gradle.properties
      - cp google-services.json android/app/
      - sed -i.bak '/<manifest/a <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml
      - flutter build apk --release --no-tree-shake-icons
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
