workflows:
  android-apk:
    name: Gerar APK Android
    instance_type: macos-medium
    environment:
      flutter: 3.19.0
    scripts:
      - name: Instalar dependências
        script: flutter pub get
      - name: Compilar APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
