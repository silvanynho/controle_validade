workflows:
  android-apk:
    name: Nutri Control APK
    environment:
      flutter: 3.16.9
    scripts:
      - flutter clean
      - flutter pub get
      - flutter create --platforms=android --no-overwrite .
      - sed -i.bak 's/minSdkVersion 19/minSdkVersion 20/g' android/app/build.gradle
      - flutter build apk --release --no-tree-shake-icons
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
