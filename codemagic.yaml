workflows:
  android-apk:
    name: Gerar APK Final
    environment:
      flutter: 3.24.0
    scripts:
      - rm -rf android
      - flutter create --platforms=android --no-overwrite lib/main.dart .
      - flutter pub get
      - chmod +x android/gradlew
      - flutter build apk --release --no-tree-shake-icons
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      
